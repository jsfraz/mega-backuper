# debug config
name: mega-backuper-example

services:

  nginx-example:
    image: nginx:alpine
    container_name: nginx-example
    volumes:
      - nginx:/usr/share/nginx/html
    # restart: always

  postgres-example:
    image: postgres:alpine
    container_name: postgres-example
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres:/var/lib/postgresql/data
    # restart: always
  
  timescaledb-example:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb-example
    environment:
      - POSTGRES_DB=timescaledb
      - POSTGRES_USER=timescaledb
      - POSTGRES_PASSWORD=timescaledb
      - PGDATA=/pgdata
    volumes:
      - timescaledb_data:/pgdata
    # restart: always
  
  mariadb-example:
    image: mariadb
    container_name: mariadb-example
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=mariadb
      - MARIADB_DATABASE=mariadb
      - MARIADB_USER=mariadb
      - MARIADB_PASSWORD=mariadb
    volumes:
      - mariadb:/var/lib/mysql
    # restart: always

  mega-backuper:
    build:
      context: .
    container_name: mega-backuper
    volumes:
      - ./backuper_test.json:/app/backuper.json
      - nginx:/tmp/nginx
    # restart: always

volumes:
  nginx:
  postgres:
  timescaledb_data:
  mariadb:
